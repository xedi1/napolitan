<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <!-- Gold gradient for premium look -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8C9A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:1" />
    </linearGradient>
    <!-- Dark background gradient -->
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (optional, can be removed) -->
  <circle cx="60" cy="60" r="50" fill="url(#darkGradient)" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Coffee cup icon -->
  <g transform="translate(30, 30)">
    <!-- Cup body -->
    <path d="M5 10 L10 50 Q15 55 25 55 L35 55 Q45 55 50 50 L55 10 Z" 
          fill="none" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Cup handle -->
    <path d="M55 18 Q68 18 68 30 Q68 42 55 42" 
          fill="none" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Coffee surface -->
    <ellipse cx="30" cy="10" rx="25" ry="5" fill="url(#goldGradient)" opacity="0.6"/>
    <!-- Steam -->
    <path d="M20 -5 Q22 -12 18 -18" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
      <animate attributeName="d" values="M20 -5 Q22 -12 18 -18;M20 -8 Q18 -15 22 -20;M20 -5 Q22 -12 18 -18" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M35 -3 Q37 -10 33 -16" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
      <animate attributeName="d" values="M35 -3 Q37 -10 33 -16;M35 -6 Q33 -13 37 -18;M35 -3 Q37 -10 33 -16" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Text: Napolitian -->
  <text x="120" y="75" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="52" 
        font-style="italic"
        font-weight="400"
        fill="url(#goldGradient)"
        filter="url(#glow)"
        letter-spacing="8">
    Napolitian
  </text>
  
  <!-- Decorative underline -->
  <path d="M125 85 Q262 88 380 82" 
        fill="none" 
        stroke="url(#goldGradient)" 
        stroke-width="1.5" 
        stroke-linecap="round"
        opacity="0.6"/>
</svg>
